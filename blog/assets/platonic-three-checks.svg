<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="chkTitle chkDesc" font-family="Inter, -apple-system, sans-serif">
  <title id="chkTitle">Three evaluation checks</title>
  <desc id="chkDesc">Shared geometry 0.98, held-out transfer alignment 0.90, order-aware signal near 1.00 vs 0.50 chance baselines.</desc>
  <rect width="520" height="480" fill="#0B0A20"/>

  <text x="260" y="28" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.08em" text-anchor="middle">THREE CHECKS &#183; QWEN &#183; DEEPSEEK &#183; GEMMA &#183; PHI</text>

  <!-- Check 1: shared shape -->
  <rect x="24" y="44" width="472" height="128" rx="12" fill="rgba(127,119,221,0.06)" stroke="#7F77DD" stroke-width="1"/>
  <text x="44" y="68" fill="#AFA9EC" font-size="9" font-weight="700" letter-spacing="0.08em">1 &#183; SHARED SHAPE</text>
  <text x="44" y="86" fill="#94a3b8" font-size="9" font-style="italic">Is there shared geometry?</text>

  <g>
    <rect x="44" y="98" width="130" height="56" rx="8" fill="rgba(29,158,117,0.08)" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="109" y="122" fill="#1D9E75" font-size="22" font-weight="700" text-anchor="middle">0.98</text>
    <text x="109" y="140" fill="#94a3b8" font-size="8" text-anchor="middle">best shared direction</text>

    <rect x="186" y="98" width="130" height="56" rx="8" fill="rgba(29,158,117,0.08)" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="251" y="122" fill="#1D9E75" font-size="22" font-weight="700" text-anchor="middle">0.94</text>
    <text x="251" y="140" fill="#94a3b8" font-size="8" text-anchor="middle">mean top-10</text>

    <rect x="328" y="98" width="130" height="56" rx="8" fill="rgba(29,158,117,0.08)" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="393" y="122" fill="#1D9E75" font-size="22" font-weight="700" text-anchor="middle">28</text>
    <text x="393" y="140" fill="#94a3b8" font-size="8" text-anchor="middle">shared dimensions</text>
  </g>

  <!-- Check 2: held-out transfer -->
  <rect x="24" y="184" width="472" height="128" rx="12" fill="rgba(255,201,122,0.05)" stroke="#FFC97A" stroke-width="1"/>
  <text x="44" y="208" fill="#FFC97A" font-size="9" font-weight="700" letter-spacing="0.08em">2 &#183; HELD-OUT TRANSFER</text>
  <text x="44" y="226" fill="#94a3b8" font-size="9" font-style="italic">Can a held-out model join?</text>

  <rect x="44" y="238" width="400" height="58" rx="8" fill="rgba(127,119,221,0.06)" stroke="rgba(127,119,221,0.2)" stroke-width="0.8"/>
  <text x="60" y="258" fill="#94a3b8" font-size="8" font-weight="600">METRIC</text>
  <text x="200" y="258" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">ALIGNMENT</text>
  <text x="300" y="258" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">HARDEST</text>
  <text x="400" y="258" fill="#94a3b8" font-size="8" font-weight="600" text-anchor="middle">CHANCE</text>
  <line x1="52" y1="264" x2="436" y2="264" stroke="rgba(127,119,221,0.2)" stroke-width="0.8"/>
  <text x="60" y="282" fill="#EEEDFE" font-size="9">Held-out transfer</text>
  <text x="200" y="282" fill="#1D9E75" font-size="14" font-weight="700" text-anchor="middle">0.90</text>
  <text x="300" y="282" fill="#1D9E75" font-size="14" font-weight="700" text-anchor="middle">0.84</text>
  <text x="400" y="282" fill="#64748b" font-size="11" font-style="italic" text-anchor="middle">~0.50</text>

  <!-- Check 3: order signal -->
  <rect x="24" y="324" width="472" height="128" rx="12" fill="rgba(93,202,165,0.05)" stroke="#5DCAA5" stroke-width="1"/>
  <text x="44" y="348" fill="#5DCAA5" font-size="9" font-weight="700" letter-spacing="0.08em">3 &#183; ORDER SIGNAL</text>
  <text x="44" y="366" fill="#94a3b8" font-size="9" font-style="italic">Does order matter?</text>

  <g>
    <rect x="44" y="378" width="200" height="56" rx="8" fill="rgba(29,158,117,0.08)" stroke="#1D9E75" stroke-width="0.8"/>
    <text x="144" y="402" fill="#1D9E75" font-size="22" font-weight="700" text-anchor="middle">~1.00</text>
    <text x="144" y="420" fill="#94a3b8" font-size="8" text-anchor="middle">order-aware</text>

    <text x="260" y="408" fill="#64748b" font-size="18" font-weight="600" text-anchor="middle">vs</text>

    <rect x="276" y="378" width="200" height="56" rx="8" fill="rgba(127,119,221,0.04)" stroke="#64748b" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="376" y="402" fill="#64748b" font-size="22" font-weight="700" text-anchor="middle">~0.50</text>
    <text x="376" y="420" fill="#94a3b8" font-size="8" text-anchor="middle">order-blind</text>
  </g>
</svg>
