<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 920 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="cityTitle cityDesc" font-family="Inter, -apple-system, sans-serif">
  <title id="cityTitle">City map analogy for platonic codes</title>
  <desc id="cityDesc">San Francisco route toward the Golden Gate Bridge. Interpretability names the landmark; platonic codes name the turns. Same route repeats; a diverging route signals anomaly.</desc>
  <defs>
    <linearGradient id="cityGrid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26215C"/>
      <stop offset="100%" stop-color="#0B0A20"/>
    </linearGradient>
    <filter id="cityGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="anomalyGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .city-block { fill: rgba(127,119,221,0.08); stroke: rgba(127,119,221,0.22); stroke-width: 0.8; }
    .city-node { fill: #0B0A20; stroke: #7F77DD; stroke-width: 1.2; }
    .city-node-label { fill: #AFA9EC; font-size: 10px; font-weight: 600; text-anchor: middle; }
    .route-normal { fill: none; stroke: #FFC97A; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; opacity: 0.9; }
    .route-anomaly { fill: none; stroke: #F87171; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 6 4; opacity: 0.95; }
    .panel-label { fill: #94a3b8; font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-anchor: middle; }
    .panel-caption { fill: #EEEDFE; font-size: 12px; font-weight: 600; text-anchor: middle; }
    .panel-sub { fill: #AFA9EC; font-size: 10px; font-style: italic; text-anchor: middle; }
    @keyframes dashFlow { to { stroke-dashoffset: -20; } }
    .route-anomaly-anim { animation: dashFlow 1.2s linear infinite; }
    @media (prefers-reduced-motion: reduce) {
      .route-anomaly-anim { animation: none; }
    }
  </style>

  <rect width="920" height="400" fill="#0B0A20"/>
  <text x="460" y="32" class="panel-label">PLATONIC CODES ARE ROUTES, NOT LANDMARK NAMES</text>

  <rect x="40" y="48" width="400" height="300" rx="14" fill="url(#cityGrid)" stroke="#7F77DD" stroke-width="0.8" opacity="0.5"/>
  <text x="240" y="72" class="panel-caption">Same trip, same codes</text>
  <text x="240" y="88" class="panel-sub">San Francisco &#183; routes by code, not names</text>

  <!-- stylized Golden Gate Bridge at route destination -->
  <g transform="translate(368, 72)" opacity="0.82">
    <rect x="0" y="22" width="5" height="26" fill="#C0362C" opacity="0.85"/>
    <rect x="55" y="22" width="5" height="26" fill="#C0362C" opacity="0.85"/>
    <line x1="2" y1="34" x2="58" y2="34" stroke="#FFC97A" stroke-width="2.2" stroke-linecap="round"/>
    <path d="M 2 22 Q 30 6 58 22" fill="none" stroke="#C0362C" stroke-width="1.2" opacity="0.75"/>
    <path d="M 2 34 Q 30 48 58 34" fill="none" stroke="#C0362C" stroke-width="0.9" opacity="0.45"/>
  </g>
  <!-- gazetteer label (interpretability) vs code -->
  <g opacity="0.55">
    <text x="398" y="58" fill="#64748b" font-size="7" font-style="italic">interpretability names:</text>
    <text x="398" y="68" fill="#64748b" font-size="8" text-decoration="line-through">Golden Gate Bridge</text>
  </g>
  <text x="330" y="108" fill="#FFC97A" font-size="7" font-weight="600" text-anchor="middle" opacity="0.9">code #4,113</text>

  <g opacity="0.85">
    <rect x="90" y="250" width="80" height="50" rx="4" class="city-block"/>
    <rect x="190" y="250" width="80" height="50" rx="4" class="city-block"/>
    <rect x="190" y="170" width="80" height="50" rx="4" class="city-block"/>
    <rect x="290" y="170" width="80" height="50" rx="4" class="city-block"/>
    <rect x="290" y="90" width="80" height="50" rx="4" class="city-block"/>
    <rect x="390" y="90" width="80" height="50" rx="4" class="city-block"/>
  </g>

  <path d="M 130 280 L 230 280 L 230 200 L 330 200 L 330 120 L 430 120" class="route-normal"/>
  <g>
    <circle cx="130" cy="280" r="10" class="city-node"/><text x="130" y="284" class="city-node-label">#1</text>
    <circle cx="230" cy="280" r="10" class="city-node"/><text x="230" y="284" class="city-node-label">#4</text>
    <circle cx="230" cy="200" r="10" class="city-node"/><text x="230" y="204" class="city-node-label">#7</text>
    <circle cx="330" cy="200" r="10" class="city-node"/><text x="330" y="204" class="city-node-label">#2</text>
    <circle cx="330" cy="120" r="10" class="city-node"/><text x="330" y="123" fill="#AFA9EC" font-size="8" font-weight="600" text-anchor="middle">4,113</text>
    <circle cx="430" cy="120" r="10" class="city-node"/><text x="430" y="124" class="city-node-label">#3</text>
  </g>
  <circle r="7" fill="#FFC97A" filter="url(#cityGlow)">
    <animateMotion dur="5s" repeatCount="indefinite" path="M 130 280 L 230 280 L 230 200 L 330 200 L 330 120 L 430 120"/>
  </circle>

  <rect x="480" y="48" width="400" height="300" rx="14" fill="url(#cityGrid)" stroke="#F87171" stroke-width="0.8" opacity="0.45"/>
  <text x="680" y="72" class="panel-caption" fill="#F87171">Route changed &#8212; anomaly</text>
  <text x="680" y="88" class="panel-sub">same start, different climb</text>

  <g opacity="0.85">
    <rect x="530" y="250" width="80" height="50" rx="4" class="city-block"/>
    <rect x="630" y="250" width="80" height="50" rx="4" class="city-block"/>
    <rect x="630" y="170" width="80" height="50" rx="4" class="city-block"/>
    <rect x="730" y="170" width="80" height="50" rx="4" class="city-block"/>
    <rect x="730" y="90" width="80" height="50" rx="4" class="city-block"/>
    <rect x="810" y="70" width="60" height="40" rx="4" fill="rgba(248,113,113,0.12)" stroke="#F87171" stroke-width="0.8"/>
  </g>

  <path d="M 530 280 L 630 280 L 630 200 L 730 200" class="route-normal" opacity="0.55"/>
  <path d="M 730 200 L 790 140 L 830 100" class="route-anomaly route-anomaly-anim"/>
  <circle cx="730" cy="200" r="14" fill="none" stroke="#F87171" stroke-width="1.2" opacity="0.5">
    <animate attributeName="r" values="12;18;12" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.35;0.85;0.35" dur="2s" repeatCount="indefinite"/>
  </circle>

  <g>
    <circle cx="530" cy="280" r="10" class="city-node"/><text x="530" y="284" class="city-node-label">#1</text>
    <circle cx="630" cy="280" r="10" class="city-node"/><text x="630" y="284" class="city-node-label">#4</text>
    <circle cx="630" cy="200" r="10" class="city-node"/><text x="630" y="204" class="city-node-label">#7</text>
    <circle cx="730" cy="200" r="10" class="city-node"/><text x="730" y="204" class="city-node-label">#2</text>
    <circle cx="830" cy="100" r="10" fill="#0B0A20" stroke="#F87171" stroke-width="1.4"/>
    <text x="830" y="104" fill="#F87171" font-size="10" font-weight="700" text-anchor="middle">#?</text>
  </g>
  <circle r="7" fill="#F87171" filter="url(#anomalyGlow)">
    <animateMotion dur="5s" begin="0.4s" repeatCount="indefinite" path="M 530 280 L 630 280 L 630 200 L 730 200 L 790 140 L 830 100"/>
  </circle>

  <text x="460" y="372" fill="#94a3b8" font-size="11" font-style="italic" text-anchor="middle">Code #4,113 need not name the bridge &#183; the route is the behavior &#183; a fork is the anomaly</text>
</svg>
