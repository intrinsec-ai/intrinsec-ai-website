<svg width="100%" viewBox="0 0 1240 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Three surfaces, three analyses</title>
  <desc>Event surface (statistical), intent surface (game-theoretic), and residual-stream surface (geometric) — each with its analysis approach.</desc>

  <defs>
    <linearGradient id="density-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFC97A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="outlier-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFC97A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="adversary-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C390EE" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#C390EE" stop-opacity="0"/>
    </radialGradient>
    <marker id="arrow-violet" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#C390EE"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#FFC97A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="620" fill="#0B0A20"/>

  <!-- PANEL 1: EVENT -->
  <g id="panel-event" transform="translate(20, 16)">
    <rect x="0" y="0" width="380" height="588" fill="#0F0E26" stroke="#26215C" stroke-width="0.6" rx="6"/>

    <text x="190" y="36" text-anchor="middle" font-size="17" fill="#FFC97A" font-weight="600">Event surface</text>
    <text x="190" y="54" text-anchor="middle" font-size="12" fill="#AFA9EC" opacity="0.85" font-style="italic">statistical</text>

    <g transform="translate(40, 68)">
      <line x1="0" y1="180" x2="300" y2="180" stroke="#7F77DD" stroke-width="0.5" opacity="0.45"/>
      <line x1="0" y1="180" x2="0" y2="30" stroke="#7F77DD" stroke-width="0.5" opacity="0.45"/>
      <text x="150" y="204" text-anchor="middle" font-size="10" fill="#7F77DD" opacity="0.7" font-style="italic">event</text>
      <text x="-12" y="105" text-anchor="middle" font-size="10" fill="#7F77DD" opacity="0.7" font-style="italic" transform="rotate(-90 -12 105)">density</text>
      <path d="M 0 180 C 60 180, 90 175, 110 145 C 130 100, 145 55, 150 42 C 155 55, 170 100, 190 145 C 210 175, 240 180, 300 180 Z" fill="url(#density-fill)"/>
      <path d="M 0 180 C 60 180, 90 175, 110 145 C 130 100, 145 55, 150 42 C 155 55, 170 100, 190 145 C 210 175, 240 180, 300 180" fill="none" stroke="#FFC97A" stroke-width="1.4" opacity="0.92"/>
      <circle cx="280" cy="175" r="14" fill="url(#outlier-glow)"/>
      <circle cx="280" cy="175" r="3.5" fill="#FFC97A"/>
      <line x1="280" y1="168" x2="280" y2="132" stroke="#FFC97A" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.65"/>
      <text x="280" y="124" text-anchor="middle" font-size="11" fill="#FFC97A" opacity="0.9" font-style="italic">outlier</text>
    </g>

    <line x1="24" y1="268" x2="356" y2="268" stroke="#26215C" stroke-width="0.8"/>

    <text x="190" y="296" text-anchor="middle" font-size="11.5" fill="#EEEDFE" opacity="0.92">
      <tspan x="190" dy="0">API calls · file writes · DB mutations</tspan>
      <tspan x="190" dy="18">Stable process, finite vocabulary</tspan>
      <tspan x="190" dy="18">Density estimation · classical UEBA</tspan>
      <tspan x="190" dy="18" fill="#FFC97A">+ provenance to the decode</tspan>
    </text>
  </g>

  <!-- PANEL 2: INTENT -->
  <g id="panel-intent" transform="translate(430, 16)">
    <rect x="0" y="0" width="380" height="588" fill="#0F0E26" stroke="#26215C" stroke-width="0.6" rx="6"/>

    <text x="190" y="36" text-anchor="middle" font-size="17" fill="#C390EE" font-weight="600">Intent surface</text>
    <text x="190" y="54" text-anchor="middle" font-size="12" fill="#AFA9EC" opacity="0.85" font-style="italic">game-theoretic</text>

    <g transform="translate(40, 68)">
      <path d="M 0 90 Q 80 55, 160 90 Q 240 125, 300 90" fill="none" stroke="#C390EE" stroke-width="1.6" stroke-dasharray="5 5" opacity="0.85"/>
      <text x="160" y="42" text-anchor="middle" font-size="11" fill="#C390EE" opacity="0.78" font-style="italic">detector boundary</text>
      <circle cx="50" cy="168" r="18" fill="url(#adversary-glow)"/>
      <circle cx="50" cy="168" r="5" fill="#C390EE"/>
      <text x="50" y="198" text-anchor="middle" font-size="11" fill="#C390EE" opacity="0.9" font-style="italic">adversary</text>
      <path d="M 56 163 Q 100 120, 112 82" fill="none" stroke="#C390EE" stroke-width="0.6" stroke-dasharray="2 2" opacity="0.45"/>
      <circle cx="113" cy="80" r="2" fill="#C390EE" opacity="0.45"/>
      <path d="M 56 163 Q 140 135, 175 82" fill="none" stroke="#C390EE" stroke-width="0.6" stroke-dasharray="2 2" opacity="0.45"/>
      <circle cx="176" cy="80" r="2" fill="#C390EE" opacity="0.45"/>
      <path d="M 56 163 Q 180 145, 230 100 Q 260 65, 275 30" fill="none" stroke="#C390EE" stroke-width="1.5" opacity="0.95" marker-end="url(#arrow-violet)"/>
    </g>

    <line x1="24" y1="268" x2="356" y2="268" stroke="#26215C" stroke-width="0.8"/>

    <text x="190" y="296" text-anchor="middle" font-size="11.5" fill="#EEEDFE" opacity="0.92">
      <tspan x="190" dy="0">Prose, images, audio — not log lines</tspan>
      <tspan x="190" dy="18">Adversary is the feature, not noise</tspan>
      <tspan x="190" dy="18" fill="#C390EE">Equilibria · best responses · mechanism design</tspan>
    </text>

    <g transform="translate(28, 368)">
      <rect x="0" y="0" width="78" height="22" rx="11" fill="rgba(195,144,238,0.1)" stroke="#C390EE" stroke-width="0.5" opacity="0.8"/>
      <text x="39" y="15" text-anchor="middle" font-size="9" fill="#C390EE">jailbreaks</text>
      <rect x="86" y="0" width="92" height="22" rx="11" fill="rgba(195,144,238,0.1)" stroke="#C390EE" stroke-width="0.5" opacity="0.8"/>
      <text x="132" y="15" text-anchor="middle" font-size="9" fill="#C390EE">injections</text>
      <rect x="186" y="0" width="78" height="22" rx="11" fill="rgba(195,144,238,0.1)" stroke="#C390EE" stroke-width="0.5" opacity="0.8"/>
      <text x="225" y="15" text-anchor="middle" font-size="9" fill="#C390EE">shift</text>
      <rect x="272" y="0" width="52" height="22" rx="11" fill="rgba(195,144,238,0.1)" stroke="#C390EE" stroke-width="0.5" opacity="0.8"/>
      <text x="298" y="15" text-anchor="middle" font-size="9" fill="#C390EE">probing</text>
    </g>
  </g>

  <!-- PANEL 3: RESIDUAL -->
  <g id="panel-residual" transform="translate(840, 16)">
    <rect x="0" y="0" width="380" height="588" fill="#0F0E26" stroke="#26215C" stroke-width="0.6" rx="6"/>

    <text x="190" y="36" text-anchor="middle" font-size="17" fill="#AFA9EC" font-weight="600">Residual-stream surface</text>
    <text x="190" y="54" text-anchor="middle" font-size="12" fill="#AFA9EC" opacity="0.85" font-style="italic">geometric</text>

    <g transform="translate(40, 58)">
      <line x1="160" y1="190" x2="40" y2="225" stroke="#7F77DD" stroke-width="0.6" opacity="0.55"/>
      <line x1="160" y1="190" x2="280" y2="210" stroke="#7F77DD" stroke-width="0.6" opacity="0.55"/>
      <line x1="160" y1="190" x2="160" y2="35" stroke="#7F77DD" stroke-width="0.6" opacity="0.55"/>
      <polygon points="40,225 280,210 280,150 40,165" fill="#AFA9EC" fill-opacity="0.07" stroke="#AFA9EC" stroke-width="0.4" stroke-opacity="0.4"/>
      <text x="280" y="232" text-anchor="end" font-size="10" fill="#AFA9EC" opacity="0.65" font-style="italic">subspace</text>
      <path d="M 60 215 Q 110 192, 160 170 Q 210 148, 245 112 Q 270 78, 280 48" fill="none" stroke="#AFA9EC" stroke-width="1.5" opacity="0.9"/>
      <g fill="#EEEDFE">
        <circle cx="60" cy="215" r="2.6" opacity="0.85"/>
        <circle cx="110" cy="192" r="2.6" opacity="0.85"/>
        <circle cx="160" cy="170" r="2.6" opacity="0.85"/>
        <circle cx="210" cy="148" r="2.6" opacity="0.85"/>
        <circle cx="245" cy="112" r="2.6" opacity="0.85"/>
        <circle cx="280" cy="48" r="2.6" opacity="0.85"/>
      </g>
      <line x1="160" y1="190" x2="252" y2="100" stroke="#FFC97A" stroke-width="1.4" opacity="0.88" marker-end="url(#arrow-amber)"/>
      <text x="258" y="95" font-size="10" fill="#FFC97A" opacity="0.9" font-style="italic">principal direction</text>
    </g>

    <line x1="24" y1="268" x2="356" y2="268" stroke="#26215C" stroke-width="0.8"/>

    <text x="190" y="296" text-anchor="middle" font-size="11.5" fill="#EEEDFE" opacity="0.92">
      <tspan x="190" dy="0">Boundary views miss the mechanism</tspan>
      <tspan x="190" dy="18">Injection lives inside the stream — and across the bus</tspan>
      <tspan x="190" dy="18" fill="#AFA9EC">Manifolds · feature directions · write-stream spectra</tspan>
    </text>
  </g>

</svg>
