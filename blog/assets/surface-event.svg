<svg width="100%" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Event surface - statistical</title>
  <defs>
    <linearGradient id="density-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFC97A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="outlier-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#FFC97A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="0" y="0" width="420" height="420" fill="#0B0A20"/>
  <rect x="20" y="20" width="380" height="380" fill="#0F0E26" stroke="#26215C" stroke-width="0.6" rx="6"/>
  <text x="210" y="56" text-anchor="middle" font-size="17" fill="#FFC97A" font-weight="600">Event surface</text>
  <text x="210" y="76" text-anchor="middle" font-size="12" fill="#AFA9EC" opacity="0.85" font-style="italic">statistical</text>
  <g transform="translate(60, 110)">
    <line x1="0" y1="220" x2="300" y2="220" stroke="#7F77DD" stroke-width="0.5" opacity="0.45"/>
    <line x1="0" y1="220" x2="0" y2="40" stroke="#7F77DD" stroke-width="0.5" opacity="0.45"/>
    <text x="150" y="246" text-anchor="middle" font-size="10" fill="#7F77DD" opacity="0.7" font-style="italic">event</text>
    <text x="-12" y="130" text-anchor="middle" font-size="10" fill="#7F77DD" opacity="0.7" font-style="italic" transform="rotate(-90 -12 130)">density</text>
    <path d="M 0 220 C 60 220, 90 215, 110 180 C 130 130, 145 80, 150 65 C 155 80, 170 130, 190 180 C 210 215, 240 220, 300 220 Z" fill="url(#density-fill)"/>
    <path d="M 0 220 C 60 220, 90 215, 110 180 C 130 130, 145 80, 150 65 C 155 80, 170 130, 190 180 C 210 215, 240 220, 300 220" fill="none" stroke="#FFC97A" stroke-width="1.4" opacity="0.92"/>
    <circle cx="280" cy="215" r="14" fill="url(#outlier-glow)"/>
    <circle cx="280" cy="215" r="3.5" fill="#FFC97A"/>
    <line x1="280" y1="208" x2="280" y2="170" stroke="#FFC97A" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.65"/>
    <text x="280" y="162" text-anchor="middle" font-size="11" fill="#FFC97A" opacity="0.9" font-style="italic">outlier</text>
