<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 440" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="detTitle detDesc" font-family="Inter, -apple-system, sans-serif">
  <title id="detTitle">What anomaly detection needs from platonic codes</title>
  <desc id="detDesc">Baseline match, clustering, and drift over sessions all require a shared platonic code trajectory.</desc>
  <defs>
    <linearGradient id="detHub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="detGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="520" height="440" fill="#0B0A20"/>
  <text x="260" y="26" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.08em" text-anchor="middle">ANOMALY DETECTION NEEDS A PLATONIC CODE</text>

  <!-- 1 · Baseline -->
  <rect x="20" y="40" width="480" height="108" rx="12" fill="rgba(127,119,221,0.06)" stroke="#7F77DD" stroke-width="1"/>
  <text x="40" y="62" fill="#AFA9EC" font-size="9" font-weight="700" letter-spacing="0.08em">1 &#183; BASELINE MATCH</text>
  <text x="40" y="78" fill="#94a3b8" font-size="9" font-style="italic">same route, same codes</text>

  <!-- run A trajectory chips -->
  <g transform="translate(40, 88)">
    <text x="0" y="10" fill="#64748b" font-size="8">run A</text>
    <rect x="0" y="16" width="28" height="14" rx="3" fill="#7F77DD" opacity="0.85"/>
    <rect x="32" y="16" width="28" height="14" rx="3" fill="#FFC97A" opacity="0.85"/>
    <rect x="64" y="16" width="28" height="14" rx="3" fill="#C390EE" opacity="0.85"/>
    <rect x="96" y="16" width="28" height="14" rx="3" fill="#7F77DD" opacity="0.85"/>
    <rect x="128" y="16" width="28" height="14" rx="3" fill="#FFC97A" opacity="0.85"/>
    <path d="M 164 23 L 178 23" stroke="#5DCAA5" stroke-width="1.2" marker-end="none"/>
    <rect x="182" y="16" width="28" height="14" rx="3" fill="#5DCAA5" opacity="0.9"/>
  </g>
  <text x="250" y="112" fill="#5DCAA5" font-size="16" font-weight="700" text-anchor="middle">=</text>
  <!-- run B identical -->
  <g transform="translate(268, 88)">
    <text x="0" y="10" fill="#64748b" font-size="8">run B</text>
    <rect x="0" y="16" width="28" height="14" rx="3" fill="#7F77DD" opacity="0.85"/>
    <rect x="32" y="16" width="28" height="14" rx="3" fill="#FFC97A" opacity="0.85"/>
    <rect x="64" y="16" width="28" height="14" rx="3" fill="#C390EE" opacity="0.85"/>
    <rect x="96" y="16" width="28" height="14" rx="3" fill="#7F77DD" opacity="0.85"/>
    <rect x="128" y="16" width="28" height="14" rx="3" fill="#FFC97A" opacity="0.85"/>
    <path d="M 164 23 L 178 23" stroke="#5DCAA5" stroke-width="1.2"/>
    <rect x="182" y="16" width="28" height="14" rx="3" fill="#5DCAA5" opacity="0.9"/>
  </g>

  <!-- 2 · Clustering -->
  <rect x="20" y="160" width="480" height="108" rx="12" fill="rgba(195,144,238,0.05)" stroke="#C390EE" stroke-width="1"/>
  <text x="40" y="182" fill="#C390EE" font-size="9" font-weight="700" letter-spacing="0.08em">2 &#183; CLUSTERING</text>
  <text x="40" y="198" fill="#94a3b8" font-size="9" font-style="italic">benign cloud vs outlier</text>

  <ellipse cx="210" cy="248" rx="88" ry="36" fill="rgba(127,119,221,0.08)" stroke="#7F77DD" stroke-width="0.8" stroke-dasharray="4 3"/>
  <g fill="#7F77DD" opacity="0.85">
    <circle cx="170" cy="238" r="4"/><circle cx="190" cy="252" r="4"/><circle cx="210" cy="242" r="4"/>
    <circle cx="230" cy="255" r="4"/><circle cx="250" cy="240" r="4"/><circle cx="200" cy="260" r="3.5"/>
    <circle cx="220" cy="232" r="3.5"/><circle cx="185" cy="248" r="3"/>
  </g>
  <!-- mini routes inside cluster -->
  <g opacity="0.55">
    <path d="M 175 250 L 195 250 L 205 242" fill="none" stroke="#AFA9EC" stroke-width="1"/>
    <path d="M 215 248 L 235 248 L 245 240" fill="none" stroke="#AFA9EC" stroke-width="1"/>
  </g>
  <!-- outlier route -->
  <g>
    <circle cx="360" cy="258" r="12" fill="none" stroke="#F87171" stroke-width="1.2" opacity="0.7">
      <animate attributeName="r" values="10;14;10" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.45;0.9;0.45" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="360" cy="258" r="5" fill="#F87171" filter="url(#detGlow)"/>
    <path d="M 300 248 L 320 252 L 340 255 L 360 258" fill="none" stroke="#F87171" stroke-width="1.8" stroke-dasharray="4 3"/>
    <text x="360" y="282" fill="#F87171" font-size="8" font-weight="600" text-anchor="middle">fork</text>
  </g>

  <!-- 3 · Drift -->
  <rect x="20" y="280" width="480" height="108" rx="12" fill="rgba(255,201,122,0.05)" stroke="#FFC97A" stroke-width="1"/>
  <text x="40" y="302" fill="#FFC97A" font-size="9" font-weight="700" letter-spacing="0.08em">3 &#183; DRIFT</text>
  <text x="40" y="318" fill="#94a3b8" font-size="9" font-style="italic">distribution shifts over sessions</text>

  <!-- session t0 cloud -->
  <ellipse cx="160" cy="352" rx="52" ry="22" fill="rgba(127,119,221,0.12)" stroke="#7F77DD" stroke-width="0.7"/>
  <text x="160" y="348" fill="#AFA9EC" font-size="7" text-anchor="middle">session t</text>
  <g fill="#7F77DD" opacity="0.7">
    <circle cx="145" cy="355" r="3"/><circle cx="160" cy="358" r="3"/><circle cx="175" cy="352" r="3"/>
  </g>

  <!-- arrow -->
  <path d="M 228 352 L 278 352" fill="none" stroke="#FFC97A" stroke-width="1.4"/>
  <path d="M 270 348 L 278 352 L 270 356" fill="none" stroke="#FFC97A" stroke-width="1.2"/>

  <!-- session t+n shifted -->
  <ellipse cx="360" cy="352" rx="52" ry="22" fill="rgba(255,201,122,0.1)" stroke="#FFC97A" stroke-width="0.7"/>
  <text x="360" y="348" fill="#FFC97A" font-size="7" text-anchor="middle">session t+n</text>
  <g fill="#FFC97A" opacity="0.75">
    <circle cx="350" cy="355" r="3"/><circle cx="368" cy="358" r="3"/><circle cx="385" cy="351" r="3"/>
  </g>

  <!-- convergence hub -->
  <line x1="130" y1="148" x2="260" y2="388" stroke="#7F77DD" stroke-width="0.8" opacity="0.35"/>
  <line x1="260" y1="268" x2="260" y2="388" stroke="#C390EE" stroke-width="0.8" opacity="0.35"/>
  <line x1="390" y1="388" x2="260" y2="388" stroke="#FFC97A" stroke-width="0.8" opacity="0.35"/>

  <rect x="180" y="398" width="160" height="32" rx="16" fill="url(#detHub)" stroke="#FFC97A" stroke-width="1"/>
  <text x="260" y="418" fill="#FFC97A" font-size="10" font-weight="700" text-anchor="middle">platonic trajectory</text>

  <text x="260" y="436" fill="#64748b" font-size="8" font-style="italic" text-anchor="middle">not a label &#183; not a log signature</text>
</svg>
