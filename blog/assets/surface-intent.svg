<svg width="100%" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, 'Segoe UI', sans-serif">
  <title>Intent surface - control-theoretic</title>
  <defs>
    <marker id="arrow-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M 0 0 L 6 3 L 0 6 Z" fill="#FFC97A"/>
    </marker>
    <radialGradient id="init-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DCAA5" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#5DCAA5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="reach-inner" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C390EE" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C390EE" stop-opacity="0.06"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="420" height="420" fill="#0B0A20"/>
  <rect x="20" y="20" width="380" height="380" fill="#0F0E26" stroke="#26215C" stroke-width="0.6" rx="6"/>

  <text x="210" y="56" text-anchor="middle" font-size="17" fill="#C390EE" font-weight="600">Intent surface</text>
  <text x="210" y="76" text-anchor="middle" font-size="12" fill="#AFA9EC" opacity="0.85" font-style="italic">control-theoretic</text>

  <g transform="translate(0, 10)">
    <ellipse cx="245" cy="180" rx="135" ry="100" fill="#C390EE" fill-opacity="0.04" stroke="#C390EE" stroke-width="0.6" stroke-dasharray="4 3" opacity="0.55"/>
    <text x="370" y="105" text-anchor="end" font-size="10" fill="#C390EE" opacity="0.85" font-style="italic">|u| = k</text>

    <ellipse cx="240" cy="185" rx="95" ry="70" fill="#C390EE" fill-opacity="0.07" stroke="#C390EE" stroke-width="0.6" stroke-dasharray="3 3" opacity="0.65"/>
    <text x="320" y="135" text-anchor="end" font-size="10" fill="#C390EE" opacity="0.85" font-style="italic">|u| = 2</text>

    <ellipse cx="230" cy="190" rx="55" ry="40" fill="url(#reach-inner)" stroke="#C390EE" stroke-width="1" opacity="0.9"/>
    <text x="230" y="195" text-anchor="middle" font-size="10" fill="#C390EE" font-style="italic">|u| = 1</text>

    <text x="245" y="100" text-anchor="middle" font-size="9" fill="#AFA9EC" opacity="0.7" font-style="italic">reachable outputs</text>

    <circle cx="75" cy="320" r="16" fill="url(#init-glow)"/>
    <circle cx="75" cy="320" r="5" fill="#5DCAA5"/>
    <text x="75" y="348" text-anchor="middle" font-size="11" fill="#5DCAA5" font-style="italic">x0</text>
    <text x="75" y="362" text-anchor="middle" font-size="9" fill="#AFA9EC" opacity="0.7">initial state</text>

    <path d="M 84 315 Q 140 270, 205 200" fill="none" stroke="#5DCAA5" stroke-width="0.9" stroke-dasharray="2 3" opacity="0.65"/>
    <circle cx="205" cy="200" r="2.5" fill="#5DCAA5" opacity="0.9"/>
    <text x="155" y="265" font-size="9" fill="#5DCAA5" opacity="0.75" font-style="italic">benign</text>

    <path d="M 84 318 Q 170 270, 240 185 Q 295 110, 345 78" fill="none" stroke="#FFC97A" stroke-width="1.5" opacity="0.95" marker-end="url(#arrow-amber)"/>
    <circle cx="345" cy="78" r="3.2" fill="#FFC97A"/>
    <text x="345" y="65" text-anchor="middle" font-size="9" fill="#FFC97A" opacity="0.9" font-style="italic">target</text>
    <text x="225" y="280" font-size="10" fill="#FFC97A" opacity="0.85" font-style="italic">adversarial control</text>
  </g>
</svg>
