<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 520 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="npbTitle npbDesc" font-family="Inter, -apple-system, sans-serif">
  <title id="npbTitle">No privileged basis and Procrustes alignment</title>
  <desc id="npbDesc">Linear invariance on the residual stream, contrast with MLP attention, Procrustes rotation between models, and where alignment is cleanest.</desc>
  <defs>
    <linearGradient id="npbPanelV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#26215C" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="npbPanelO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D85A30" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#26215C" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="npbPanelG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#26215C" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="npbDogGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC97A" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FFC97A" stop-opacity="0"/>
    </radialGradient>
    <filter id="npbGlowA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="npbGlowV" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="npbArr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#AFA9EC"/>
    </marker>
    <marker id="npbArrG" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#5DCAA5"/>
    </marker>
    <clipPath id="npbResidualClip">
      <rect x="-60" y="-50" width="120" height="100" rx="4"/>
    </clipPath>
  </defs>

  <style>
    .npb-grid line { stroke: rgba(127,119,221,0.06); stroke-width: 0.5; }
    .npb-dog-pulse { animation: npbPulse 2.8s ease-in-out infinite; }
    .npb-flow { stroke-dasharray: 6 8; animation: npbFlow 2.4s linear infinite; }
    .npb-overlap { animation: npbFade 3s ease-in-out infinite alternate; }
    @keyframes npbPulse { 0%,100% { opacity: 0.75; } 50% { opacity: 1; } }
    @keyframes npbFlow { to { stroke-dashoffset: -28; } }
    @keyframes npbFade { from { opacity: 0.35; } to { opacity: 0.75; } }
    @media (prefers-reduced-motion: reduce) {
      .npb-dog-pulse, .npb-flow, .npb-overlap { animation: none; }
    }
  </style>

  <rect width="520" height="640" fill="#0B0A20"/>

  <g class="npb-grid">
    <line x1="0" y1="80" x2="520" y2="80"/><line x1="0" y1="160" x2="520" y2="160"/>
    <line x1="0" y1="240" x2="520" y2="240"/><line x1="0" y1="320" x2="520" y2="320"/>
    <line x1="0" y1="400" x2="520" y2="400"/><line x1="0" y1="480" x2="520" y2="480"/>
    <line x1="0" y1="560" x2="520" y2="560"/>
  </g>

  <!-- PART 1 -->
  <text x="260" y="26" text-anchor="middle" fill="#AFA9EC" font-size="9" font-weight="700" letter-spacing="0.14em">PART 1 &#183; LINEAR INVARIANCE</text>
  <text x="260" y="42" text-anchor="middle" fill="#64748b" font-size="8" font-style="italic">same direction in space &#8212; different coordinates on paper</text>

  <!-- original basis -->
  <g transform="translate(28,54)">
    <rect width="200" height="132" rx="14" fill="url(#npbPanelV)" stroke="#7F77DD" stroke-width="1.1" filter="url(#npbGlowV)"/>
    <text x="100" y="20" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">original basis</text>
    <g transform="translate(100,78)">
      <line x1="-52" y1="28" x2="52" y2="28" stroke="#475569" stroke-width="0.9"/>
      <line x1="-52" y1="28" x2="-52" y2="-36" stroke="#475569" stroke-width="0.9"/>
      <text x="48" y="40" fill="#64748b" font-size="7">x</text>
      <text x="-60" y="-30" fill="#64748b" font-size="7">y</text>
      <line x1="-52" y1="28" x2="18" y2="-22" stroke="#FFC97A" stroke-width="2.4" class="npb-dog-pulse" marker-end="url(#npbArr)"/>
      <circle cx="18" cy="-22" r="5" fill="url(#npbDogGlow)"/>
      <circle cx="18" cy="-22" r="2.5" fill="#FFC97A"/>
      <text x="24" y="-26" fill="#FFC97A" font-size="9" font-weight="700">dog</text>
    </g>
    <text x="100" y="122" text-anchor="middle" fill="#cbd5e1" font-size="8">(0.71, 0.71)</text>
  </g>

  <!-- rotate -->
  <g transform="translate(228,98)">
    <path d="M0,8 C16,-6 32,-6 48,8" fill="none" stroke="#AFA9EC" stroke-width="1.5" marker-end="url(#npbArr)" class="npb-flow"/>
    <text x="24" y="0" text-anchor="middle" fill="#EEEDFE" font-size="9" font-weight="600">45&#176;</text>
    <text x="24" y="34" text-anchor="middle" fill="#64748b" font-size="7">rotate basis</text>
  </g>

  <!-- rotated basis -->
  <g transform="translate(292,54)">
    <rect width="200" height="132" rx="14" fill="url(#npbPanelV)" stroke="#7F77DD" stroke-width="1.1" filter="url(#npbGlowV)"/>
    <text x="100" y="20" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600">rotated basis</text>
    <g transform="translate(100,78)">
      <g transform="rotate(-45)">
        <line x1="-52" y1="28" x2="52" y2="28" stroke="#475569" stroke-width="0.9" opacity="0.7"/>
        <line x1="-52" y1="28" x2="-52" y2="-36" stroke="#475569" stroke-width="0.9" opacity="0.7"/>
      </g>
      <text x="44" y="42" fill="#64748b" font-size="7">x'</text>
      <text x="58" y="-8" fill="#64748b" font-size="7">y'</text>
      <line x1="-52" y1="28" x2="18" y2="-22" stroke="#FFC97A" stroke-width="2.4" class="npb-dog-pulse"/>
      <circle cx="18" cy="-22" r="5" fill="url(#npbDogGlow)"/>
      <circle cx="18" cy="-22" r="2.5" fill="#FFC97A"/>
      <text x="24" y="-26" fill="#FFC97A" font-size="9" font-weight="700">dog</text>
    </g>
    <text x="100" y="122" text-anchor="middle" fill="#cbd5e1" font-size="8">(1.0, 0.0)</text>
  </g>

  <rect x="28" y="196" width="464" height="28" rx="8" fill="rgba(255,201,122,0.1)" stroke="rgba(255,201,122,0.3)" stroke-width="0.8"/>
  <text x="260" y="214" text-anchor="middle" fill="#FFC97A" font-size="9" font-weight="600">behavior unchanged &#8212; only the numbers moved</text>

  <!-- CONTRAST: visual panels -->
  <text x="260" y="244" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600" letter-spacing="0.08em">WHERE THE SYMMETRY BREAKS</text>

  <!-- MLP: axis-aligned ReLU -->
  <g transform="translate(28,256)">
    <rect width="224" height="108" rx="14" fill="url(#npbPanelO)" stroke="#D85A30" stroke-width="1.1"/>
    <text x="16" y="20" fill="#F0997B" font-size="8" font-weight="700">MLP / ATTENTION</text>
    <text x="16" y="34" fill="#94a3b8" font-size="7">privileged basis</text>
    <g transform="translate(112,68)">
      <line x1="-44" y1="22" x2="44" y2="22" stroke="#475569" stroke-width="0.8"/>
      <line x1="-44" y1="22" x2="-44" y2="-28" stroke="#475569" stroke-width="0.8"/>
      <rect x="-44" y="-28" width="44" height="50" fill="rgba(216,90,48,0.12)" stroke="none"/>
      <rect x="-44" y="22" width="88" height="4" fill="rgba(216,90,48,0.35)"/>
      <path d="M-44,22 L-44,-8 L44,-8" fill="none" stroke="#F0997B" stroke-width="1.6"/>
      <text x="0" y="38" text-anchor="middle" fill="#64748b" font-size="6">ReLU locks axes</text>
      <line x1="-20" y1="22" x2="-20" y2="-14" stroke="#FFC97A" stroke-width="1.8" opacity="0.5"/>
      <line x1="10" y1="22" x2="10" y2="-20" stroke="#64748b" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.4"/>
    </g>
  </g>

  <!-- Residual: rotation symmetry -->
    <g transform="translate(268,256)">
    <rect width="224" height="108" rx="14" fill="url(#npbPanelG)" stroke="#1D9E75" stroke-width="1.1"/>
    <text x="16" y="20" fill="#5DCAA5" font-size="8" font-weight="700">RESIDUAL STREAM</text>
    <text x="16" y="34" fill="#94a3b8" font-size="7">no privileged basis</text>
    <g transform="translate(112,68)" clip-path="url(#npbResidualClip)">
      <circle cx="0" cy="0" r="34" fill="none" stroke="rgba(29,158,117,0.15)" stroke-width="1"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="rgba(29,158,117,0.2)" stroke-width="0.8"/>
      <path d="M0,-28 A28,28 0 1 1 -20,20" fill="none" stroke="#5DCAA5" stroke-width="1.3" marker-end="url(#npbArrG)"/>
      <line x1="0" y1="0" x2="24" y2="-16" stroke="#FFC97A" stroke-width="2.2" class="npb-dog-pulse"/>
      <circle cx="24" cy="-16" r="2.5" fill="#FFC97A"/>
      <text x="0" y="44" text-anchor="middle" fill="#64748b" font-size="6">rotation is symmetry</text>
    </g>
  </g>

  <!-- PART 2 PROCRUSTES -->
  <text x="260" y="388" text-anchor="middle" fill="#AFA9EC" font-size="9" font-weight="700" letter-spacing="0.14em">PART 2 &#183; PROCRUSTES</text>
  <text x="260" y="404" text-anchor="middle" fill="#64748b" font-size="8" font-style="italic">find the rotation that overlaps two point clouds</text>

  <rect x="28" y="416" width="464" height="128" rx="14" fill="rgba(127,119,221,0.05)" stroke="#7F77DD" stroke-width="1"/>

  <!-- Model A cloud -->
  <g transform="translate(108,480)" filter="url(#npbGlowA)">
    <ellipse cx="0" cy="0" rx="52" ry="36" fill="rgba(127,119,221,0.15)" stroke="#7F77DD" stroke-width="1"/>
    <g fill="#AFA9EC">
      <circle cx="-22" cy="-8" r="3.5"/><circle cx="-4" cy="-16" r="3.5"/><circle cx="16" cy="-6" r="3.5"/>
      <circle cx="-12" cy="10" r="3.5"/><circle cx="14" cy="12" r="3.5"/><circle cx="2" cy="4" r="3.5"/>
    </g>
    <text x="0" y="-48" text-anchor="middle" fill="#AFA9EC" font-size="8" font-weight="600">Model A</text>
    <text x="0" y="-38" text-anchor="middle" fill="#64748b" font-size="7">layer L</text>
  </g>

  <!-- rotation arrow -->
  <g transform="translate(228,480)">
    <path d="M0,-6 C28,-20 56,-20 84,-6" fill="none" stroke="#C390EE" stroke-width="1.6" marker-end="url(#npbArr)" class="npb-flow"/>
    <text x="42" y="-22" text-anchor="middle" fill="#EEEDFE" font-size="8" font-weight="600">rotate</text>
  </g>

  <!-- Model B cloud -->
  <g transform="translate(412,480)" filter="url(#npbGlowA)">
    <ellipse cx="0" cy="0" rx="52" ry="36" fill="rgba(29,158,117,0.12)" stroke="#1D9E75" stroke-width="1"/>
    <g fill="#5DCAA5">
      <circle cx="-18" cy="-4" r="3.5"/><circle cx="2" cy="-14" r="3.5"/><circle cx="20" cy="-2" r="3.5"/>
      <circle cx="-8" cy="12" r="3.5"/><circle cx="18" cy="14" r="3.5"/><circle cx="6" cy="6" r="3.5"/>
    </g>
    <text x="0" y="-48" text-anchor="middle" fill="#5DCAA5" font-size="8" font-weight="600">Model B</text>
    <text x="0" y="-38" text-anchor="middle" fill="#64748b" font-size="7">layer L</text>
  </g>

  <!-- overlap hint in center -->
  <g transform="translate(260,480)" class="npb-overlap">
    <ellipse cx="0" cy="0" rx="28" ry="20" fill="rgba(195,144,238,0.12)" stroke="#C390EE" stroke-width="0.8" stroke-dasharray="3 2"/>
    <text x="0" y="4" text-anchor="middle" fill="#C390EE" font-size="7" font-weight="600">aligned</text>
  </g>

  <rect x="28" y="552" width="464" height="28" rx="8" fill="rgba(195,144,238,0.08)" stroke="rgba(195,144,238,0.25)" stroke-width="0.8"/>
  <text x="260" y="570" text-anchor="middle" fill="#C390EE" font-size="9">same geometry &#8212; different coordinates</text>

  <!-- WHERE ALIGNMENT HOLDS -->
  <text x="260" y="598" text-anchor="middle" fill="#94a3b8" font-size="8" font-weight="600" letter-spacing="0.08em">WHERE ALIGNMENT HOLDS</text>

  <g transform="translate(28,608)">
    <rect width="148" height="24" rx="6" fill="rgba(29,158,117,0.18)" stroke="#1D9E75" stroke-width="0.9"/>
    <circle cx="14" cy="12" r="4" fill="#1D9E75"/>
    <text x="24" y="15" fill="#5DCAA5" font-size="7" font-weight="600">same model + layer</text>
  </g>
  <g transform="translate(186,608)">
    <rect width="148" height="24" rx="6" fill="rgba(255,201,122,0.14)" stroke="#FFC97A" stroke-width="0.9"/>
    <circle cx="14" cy="12" r="4" fill="#FFC97A"/>
    <text x="24" y="15" fill="#FFC97A" font-size="7" font-weight="600">cross-model + layer</text>
  </g>
  <g transform="translate(344,608)">
    <rect width="148" height="24" rx="6" fill="rgba(216,90,48,0.14)" stroke="#D85A30" stroke-width="0.9"/>
    <circle cx="14" cy="12" r="4" fill="#D85A30"/>
    <text x="24" y="15" fill="#F0997B" font-size="7" font-weight="600">cross-layer (lossy)</text>
  </g>
</svg>
